name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - run: dotnet restore DevToys.TcpTool.slnx

      - run: dotnet build DevToys.TcpTool.slnx -c Release --no-restore

      - run: dotnet test tests/DevToys.TcpTool.Tests -c Release --no-build

      - run: dotnet pack src/DevToys.TcpTool -c Release -o out --no-build

      - uses: NuGet/login@v1
        id: login
        with:
          user: wangchunlong

      - run: dotnet nuget push out\*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
